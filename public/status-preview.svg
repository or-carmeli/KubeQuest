<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020817"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020817"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#A855F7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
    <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#00D4FF" stroke-opacity="0.03" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>

  <!-- Glow effect -->
  <ellipse cx="600" cy="280" rx="400" ry="200" fill="url(#glow)"/>

  <!-- Logo circle -->
  <circle cx="600" cy="185" r="42" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.7"/>
  <circle cx="600" cy="185" r="8" fill="#00D4FF"/>
  <g transform="translate(600,185)" stroke="url(#accent)" stroke-width="2" stroke-linecap="round">
    <line x1="0" y1="-15" x2="0" y2="-30" transform="rotate(0)"/>
    <line x1="0" y1="-15" x2="0" y2="-30" transform="rotate(51.4)"/>
    <line x1="0" y1="-15" x2="0" y2="-30" transform="rotate(102.8)"/>
    <line x1="0" y1="-15" x2="0" y2="-30" transform="rotate(154.2)"/>
    <line x1="0" y1="-15" x2="0" y2="-30" transform="rotate(205.7)"/>
    <line x1="0" y1="-15" x2="0" y2="-30" transform="rotate(257.1)"/>
    <line x1="0" y1="-15" x2="0" y2="-30" transform="rotate(308.5)"/>
  </g>

  <!-- Title -->
  <text x="600" y="280" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="48" font-weight="800" fill="#e2e8f0">KubeQuest Status</text>

  <!-- Subtitle -->
  <text x="600" y="320" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="20" fill="#64748b">Real-time platform and service health</text>

  <!-- Status badge -->
  <rect x="430" y="365" width="340" height="48" rx="24" fill="#10B98112" stroke="#10B98133" stroke-width="1"/>
  <circle cx="470" cy="389" r="8" fill="#10B981"/>
  <text x="490" y="396" font-family="Segoe UI, system-ui, sans-serif" font-size="20" font-weight="700" fill="#10B981">All Systems Operational</text>

  <!-- Service cards -->
  <rect x="200" y="450" width="170" height="60" rx="10" fill="#ffffff06" stroke="#ffffff0a" stroke-width="1"/>
  <circle cx="228" cy="475" r="5" fill="#10B981"/>
  <text x="242" y="480" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="600" fill="#94a3b8">Authentication</text>
  <text x="228" y="498" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#475569">Operational</text>

  <rect x="395" y="450" width="170" height="60" rx="10" fill="#ffffff06" stroke="#ffffff0a" stroke-width="1"/>
  <circle cx="423" cy="475" r="5" fill="#10B981"/>
  <text x="437" y="480" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="600" fill="#94a3b8">Database</text>
  <text x="423" y="498" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#475569">Operational</text>

  <rect x="590" y="450" width="170" height="60" rx="10" fill="#ffffff06" stroke="#ffffff0a" stroke-width="1"/>
  <circle cx="618" cy="475" r="5" fill="#10B981"/>
  <text x="632" y="480" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="600" fill="#94a3b8">Quiz Engine</text>
  <text x="618" y="498" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#475569">Operational</text>

  <rect x="785" y="450" width="170" height="60" rx="10" fill="#ffffff06" stroke="#ffffff0a" stroke-width="1"/>
  <circle cx="813" cy="475" r="5" fill="#10B981"/>
  <text x="827" y="480" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="600" fill="#94a3b8">CDN / Assets</text>
  <text x="813" y="498" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#475569">Operational</text>

  <!-- URL -->
  <text x="600" y="575" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#334155">status.kubequest.online</text>
</svg>
