<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#020817"/>
    </radialGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="29" fill="none" stroke="url(#g1)" stroke-width="2.5" opacity="0.85" filter="url(#glow)"/>

  <!-- 7 spokes (Kubernetes wheel) -->
  <g filter="url(#glow)">
    <line x1="32" y1="21" x2="32" y2="10" stroke="url(#g1)" stroke-width="2" stroke-linecap="round"/>
    <line x1="32" y1="21" x2="32" y2="10" stroke="url(#g1)" stroke-width="2" stroke-linecap="round" transform="rotate(51.4 32 32)"/>
    <line x1="32" y1="21" x2="32" y2="10" stroke="url(#g1)" stroke-width="2" stroke-linecap="round" transform="rotate(102.8 32 32)"/>
    <line x1="32" y1="21" x2="32" y2="10" stroke="url(#g1)" stroke-width="2" stroke-linecap="round" transform="rotate(154.2 32 32)"/>
    <line x1="32" y1="21" x2="32" y2="10" stroke="url(#g1)" stroke-width="2" stroke-linecap="round" transform="rotate(205.7 32 32)"/>
    <line x1="32" y1="21" x2="32" y2="10" stroke="url(#g1)" stroke-width="2" stroke-linecap="round" transform="rotate(257.1 32 32)"/>
    <line x1="32" y1="21" x2="32" y2="10" stroke="url(#g1)" stroke-width="2" stroke-linecap="round" transform="rotate(308.5 32 32)"/>
  </g>

  <!-- Inner hub ring -->
  <circle cx="32" cy="32" r="7" fill="none" stroke="url(#g1)" stroke-width="2" filter="url(#glow)"/>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="3.5" fill="#00D4FF" filter="url(#glow)"/>

  <!-- 7 outer dots at spoke tips -->
  <circle cx="32" cy="10" r="2.5" fill="#00D4FF" filter="url(#glow)"/>
  <circle cx="32" cy="10" r="2.5" fill="#5BC8FF" filter="url(#glow)" transform="rotate(51.4 32 32)"/>
  <circle cx="32" cy="10" r="2.5" fill="#A855F7" filter="url(#glow)" transform="rotate(102.8 32 32)"/>
  <circle cx="32" cy="10" r="2.5" fill="#C060E0" filter="url(#glow)" transform="rotate(154.2 32 32)"/>
  <circle cx="32" cy="10" r="2.5" fill="#FF6B35" filter="url(#glow)" transform="rotate(205.7 32 32)"/>
  <circle cx="32" cy="10" r="2.5" fill="#FF9055" filter="url(#glow)" transform="rotate(257.1 32 32)"/>
  <circle cx="32" cy="10" r="2.5" fill="#33BBFF" filter="url(#glow)" transform="rotate(308.5 32 32)"/>
</svg>
