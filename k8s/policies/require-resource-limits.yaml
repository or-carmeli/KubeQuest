apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  annotations:
    policies.kyverno.io/title: Require Resource Limits
    policies.kyverno.io/description: >-
      Every container must declare CPU and memory limits to prevent
      noisy-neighbour issues and OOMKilled surprises.
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: check-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "CPU and memory limits are required."
        pattern:
          spec:
            containers:
              - resources:
                  limits:
                    cpu: "?*"
                    memory: "?*"
            =(initContainers):
              - resources:
                  limits:
                    cpu: "?*"
                    memory: "?*"
            =(ephemeralContainers):
              - resources:
                  limits:
                    cpu: "?*"
                    memory: "?*"
