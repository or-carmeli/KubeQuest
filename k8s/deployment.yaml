apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubequest
  namespace: kubequest
  labels:
    app: kubequest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubequest
  template:
    metadata:
      labels:
        app: kubequest
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kubequest
          image: ghcr.io/or-carmeli/kubequest:2.4.0  # pin to release tag; use @sha256:<digest> for immutable deploys
          ports:
            - containerPort: 8080

          # Resource requests and limits prevent OOMKilled and noisy-neighbour issues
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

          # Liveness probe: restart the container if nginx stops responding
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15

          # Readiness probe: only send traffic once nginx is ready
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10

          # Security: drop all capabilities, read-only root with writable tmpfs
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}

      # Graceful shutdown: wait for in-flight requests before terminating
      terminationGracePeriodSeconds: 30
